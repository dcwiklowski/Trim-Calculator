<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trim Miter Calculator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8922a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trim Calc">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1510;
    --surface: #231e18;
    --surface2: #2e2720;
    --border: #4a3e2e;
    --gold: #c8922a;
    --gold-light: #e8b84b;
    --gold-dim: #7a5a1a;
    --text: #f0e6d0;
    --text-dim: #9a8870;
    --accent: #8bc4a8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(74,62,46,0.15) 39px, rgba(74,62,46,0.15) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(74,62,46,0.08) 39px, rgba(74,62,46,0.08) 40px);
  }

  header { text-align: center; margin-bottom: 28px; }

  .eyebrow {
    font-size: 10px; letter-spacing: 4px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 8px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 42px);
    color: var(--text); line-height: 1.1;
  }

  h1 span { color: var(--gold-light); }

  .divider {
    width: 100px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  .mode-tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 880px;
    margin-bottom: 20px;
  }

  .mode-tab {
    padding: 10px 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.4;
    transition: all 0.2s;
  }

  .mode-tab .tab-icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .mode-tab.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 600; }
  .mode-tab:hover:not(.active) { border-color: var(--gold-dim); color: var(--text); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 880px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
    border-radius: 4px 4px 0 0;
  }

  .card-title {
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 20px;
  }

  .field { margin-bottom: 16px; }

  label {
    display: block; font-size: 10px; letter-spacing: 1.5px;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px;
  }

  .input-wrap {
    display: flex; align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px; overflow: hidden;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--gold); }

  input[type="number"] {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 15px; padding: 9px 12px; width: 100%;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .unit {
    padding: 9px 12px 9px 0; font-size: 10px;
    color: var(--gold-dim); letter-spacing: 1px; white-space: nowrap;
  }

  .toggle-row { display: flex; gap: 6px; margin-bottom: 18px; }

  .toggle-btn {
    flex: 1; padding: 7px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 3px; color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 1.5px;
    cursor: pointer; text-transform: uppercase; transition: all 0.2s;
  }

  .toggle-btn.active {
    background: var(--gold); border-color: var(--gold);
    color: var(--bg); font-weight: 600;
  }

  .end-row { display: flex; gap: 6px; }

  .end-btn {
    flex: 1; padding: 5px 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 3px; color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; letter-spacing: 1px;
    cursor: pointer; text-transform: uppercase; transition: all 0.2s;
    text-align: center;
  }

  .end-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); }

  .end-label {
    font-size: 9px; color: var(--text-dim);
    letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase;
  }

  .diagram-wrap {
    display: flex; justify-content: center; align-items: center;
    padding: 12px 0; min-height: 140px;
  }

  svg text { font-family: 'IBM Plex Mono', monospace; }

  .results-card { grid-column: 1 / -1; }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .result-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 3px; padding: 14px 16px;
    position: relative; transition: border-color 0.2s;
  }

  .result-item:hover { border-color: var(--gold-dim); }

  .result-label {
    font-size: 10px; letter-spacing: 2px; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 4px;
  }

  .result-piece { font-size: 10px; color: var(--gold-dim); margin-bottom: 2px; letter-spacing: 1px; }

  .result-value {
    font-family: 'Playfair Display', serif;
    font-size: 22px; color: var(--gold-light);
  }

  .result-note { font-size: 9px; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.5px; }

  .cut-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--gold-dim); color: var(--bg);
    font-size: 9px; letter-spacing: 1px;
    padding: 2px 6px; border-radius: 2px;
    text-transform: uppercase; font-weight: 600;
  }

  .total-item {
    grid-column: 1 / -1;
    background: rgba(200,146,42,0.05);
    border-color: var(--gold-dim);
  }

  .calc-toggle {
    display: block; width: 100%; margin-top: 12px;
    padding: 8px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 3px 3px 0 0;
    color: var(--gold-dim); font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; text-align: left; transition: color 0.2s, border-color 0.2s;
  }

  .calc-toggle:hover { color: var(--gold); border-color: var(--gold-dim); }

  .calc-breakdown {
    display: none;
    background: var(--surface2); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 3px 3px;
    padding: 16px; font-size: 11px;
    color: var(--text-dim); line-height: 2;
  }

  .calc-section { margin-bottom: 14px; }
  .calc-section:last-child { margin-bottom: 0; }

  .calc-heading {
    font-size: 10px; letter-spacing: 2px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 6px;
  }

  .calc-line { display: flex; justify-content: space-between; }
  .calc-line span:last-child { color: var(--text); }

  .calc-result {
    border-top: 1px solid var(--border); margin-top: 4px;
    padding-top: 6px; color: var(--gold-light); font-weight: 600;
  }

  .info-box {
    background: rgba(139,196,168,0.07);
    border: 1px solid rgba(139,196,168,0.2);
    border-radius: 3px; padding: 12px 14px;
    margin-top: 12px; font-size: 11px;
    color: var(--accent); line-height: 1.7;
  }

  .no-data {
    color: var(--text-dim); font-size: 12px;
    text-align: center; padding: 28px; letter-spacing: 1px;
  }

  .sub-label {
    font-size: 9px; color: var(--text-dim);
    letter-spacing: 0.5px; margin: 6px 0 4px;
  }

  .section-divider {
    height: 1px; background: var(--border); margin: 14px 0;
  }

  @media (max-width: 580px) {
    .layout { grid-template-columns: 1fr; }
    .results-grid { grid-template-columns: 1fr; }
    .results-card { grid-column: 1; }
    .mode-tabs { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Woodworking Tool</p>
  <h1>Trim <span>Miter</span> Calculator</h1>
  <div class="divider"></div>
</header>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="setMode('ltrim', this)">
    <span class="tab-icon">🔲</span>L-Trim<br>Panel Wrap
  </button>
  <button class="mode-tab" onclick="setMode('frame', this)">
    <span class="tab-icon">🖼️</span>Picture<br>Frame
  </button>
  <button class="mode-tab" onclick="setMode('window', this)">
    <span class="tab-icon">🪟</span>Window<br>Casing
  </button>
  <button class="mode-tab" onclick="setMode('door', this)">
    <span class="tab-icon">🚪</span>Door<br>Casing
  </button>
</div>

<div class="layout" id="appLayout"></div>

<script>
let unit = 'in';
let mode = 'ltrim';
let measureRef = 'inside';
let doorBase = 'floor';

let ends = {
  long1:  { a: 'miter', b: 'miter' },
  short1: { a: 'miter', b: 'miter' },
  sideL:  { a: 'miter', b: 'straight' },
  header: { a: 'miter', b: 'miter' },
};

// ── Helpers ──────────────────────────────────────────────────────────────────

function fmt(v) {
  if (unit === 'mm') return v.toFixed(1) + ' mm';
  return toFraction(v) + '"';
}

function toFraction(dec) {
  if (dec < 0) return '-' + toFraction(-dec);
  const whole = Math.floor(dec);
  const frac = dec - whole;
  const denoms = [2,4,8,16,32];
  let best = {n:0,d:1}, bestErr = 1;
  for (let d of denoms) {
    const n = Math.round(frac * d);
    const err = Math.abs(frac - n/d);
    if (err < bestErr) { bestErr = err; best = {n,d}; }
  }
  if (bestErr < 0.005) {
    const g = gcd(best.n, best.d);
    const n = best.n/g, d = best.d/g;
    if (n === 0) return whole === 0 ? '0' : String(whole);
    if (d === 1) return String(whole + n);
    return (whole > 0 ? whole + ' ' : '') + n + '\u2044' + d;
  }
  return dec.toFixed(3);
}

function gcd(a,b) { return b ? gcd(b, a%b) : a; }

function val(id) { return parseFloat(document.getElementById(id)?.value) || 0; }

function endLabel(e) { return e === 'miter' ? '45\u00b0 miter' : 'straight cut'; }

function longPt(inside, trimW, endA, endB) {
  return inside + (endA === 'miter' ? trimW : 0) + (endB === 'miter' ? trimW : 0);
}

// ── State setters ─────────────────────────────────────────────────────────────

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setUnit(u) {
  unit = u;
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('active', b.dataset.u === u));
  document.querySelectorAll('.unit-label').forEach(el => el.textContent = u);
  calc();
}

function setRef(r) {
  measureRef = r;
  document.querySelectorAll('.ref-btn').forEach(b => b.classList.toggle('active', b.dataset.r === r));
  calc();
}

function setBase(b) {
  doorBase = b;
  document.querySelectorAll('.base-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.b === b));
  const pf = document.getElementById('plinthField');
  if (pf) pf.style.display = b === 'plinth' ? 'block' : 'none';
  calc();
}

function toggleEnd(piece, side) {
  ends[piece][side] = ends[piece][side] === 'miter' ? 'straight' : 'miter';
  const btn = document.getElementById('end-' + piece + '-' + side);
  if (btn) {
    const isMiter = ends[piece][side] === 'miter';
    btn.classList.toggle('active', isMiter);
    btn.textContent = isMiter ? '45\u00b0 Miter' : 'Straight';
  }
  calc();
}

function toggleCalc(btn) {
  const panel = btn.nextElementSibling;
  const open = panel.style.display !== 'block';
  panel.style.display = open ? 'block' : 'none';
  btn.textContent = (open ? '\u25bc' : '\u25b6') + ' ' + (open ? 'Hide' : 'Show') + ' Calculation';
}

// ── End-type toggle HTML ──────────────────────────────────────────────────────

function endToggle(piece, side, labelText) {
  const isMiter = ends[piece][side] === 'miter';
  return `<div style="flex:1">
    <p class="end-label">${labelText}</p>
    <button class="end-btn ${isMiter ? 'active' : ''}" id="end-${piece}-${side}"
      onclick="toggleEnd('${piece}','${side}')">
      ${isMiter ? '45\u00b0 Miter' : 'Straight'}
    </button>
  </div>`;
}

// ── Calculation breakdown HTML ────────────────────────────────────────────────

function calcBox(sections) {
  const inner = sections.map(s => `
    <div class="calc-section">
      <p class="calc-heading">${s.label}</p>
      ${s.lines.map(l => `<div class="calc-line"><span>${l.k}</span><span>${l.v}</span></div>`).join('')}
      <div class="calc-line calc-result"><span>Result</span><span>${s.result}</span></div>
    </div>`).join('');
  return `<button class="calc-toggle" onclick="toggleCalc(this)">\u25b6 Show Calculation</button>
    <div class="calc-breakdown">${inner}</div>`;
}

// ── RENDER ───────────────────────────────────────────────────────────────────

function render() {
  const layout = document.getElementById('appLayout');

  if (mode === 'ltrim') {
    layout.innerHTML = `
      <div class="card">
        <p class="card-title">&#9642; Panel Dimensions</p>
        <div class="toggle-row">
          <button class="toggle-btn unit-btn ${unit==='in'?'active':''}" data-u="in" onclick="setUnit('in')">Inches</button>
          <button class="toggle-btn unit-btn ${unit==='mm'?'active':''}" data-u="mm" onclick="setUnit('mm')">MM</button>
        </div>
        <div class="field">
          <label>Panel Length (long side)</label>
          <div class="input-wrap">
            <input type="number" id="panelLength" min="0" step="0.0625" placeholder="e.g. 24" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
        <div class="field">
          <label>Panel Width (short side)</label>
          <div class="input-wrap">
            <input type="number" id="panelWidth" min="0" step="0.0625" placeholder="e.g. 18" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
      </div>

      <div class="card">
        <p class="card-title">&#9642; L-Trim Profile</p>
        <div class="diagram-wrap">
          <svg id="trimDiagram" width="190" height="140" viewBox="0 0 190 140"></svg>
        </div>
        <div class="field">
          <label>Trim Leg A &mdash; covers panel face</label>
          <div class="input-wrap">
            <input type="number" id="legA" min="0" step="0.0625" placeholder="e.g. 1.25" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
        <div class="field">
          <label>Trim Leg B &mdash; wraps panel edge</label>
          <div class="input-wrap">
            <input type="number" id="legB" min="0" step="0.0625" placeholder="e.g. 1.25" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
        <div class="field">
          <label>Trim Thickness</label>
          <div class="input-wrap">
            <input type="number" id="trimThick" min="0" step="0.0625" placeholder="e.g. 0.25" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
      </div>

      <div class="card results-card">
        <p class="card-title">&#9642; Cut List &mdash; 45&deg; miter both ends, all pieces</p>
        <div id="results"><p class="no-data">Enter dimensions above to calculate</p></div>
      </div>`;
    drawLDiagram();

  } else if (mode === 'frame' || mode === 'window') {
    const isFrame = mode === 'frame';
    const dimALabel = isFrame ? 'Opening Length (long side)' : 'Opening Width';
    const dimBLabel = isFrame ? 'Opening Width (short side)' : 'Opening Height';
    const trimIdW   = isFrame ? 'trimWidth' : 'casingWidth';
    const trimIdT   = isFrame ? 'trimThick2' : 'casingThick';

    layout.innerHTML = `
      <div class="card">
        <p class="card-title">&#9642; ${isFrame ? 'Frame' : 'Window'} Opening</p>
        <div class="toggle-row">
          <button class="toggle-btn unit-btn ${unit==='in'?'active':''}" data-u="in" onclick="setUnit('in')">Inches</button>
          <button class="toggle-btn unit-btn ${unit==='mm'?'active':''}" data-u="mm" onclick="setUnit('mm')">MM</button>
        </div>
        <div class="toggle-row">
          <button class="toggle-btn ref-btn ${measureRef==='inside'?'active':''}" data-r="inside" onclick="setRef('inside')">Inside</button>
          <button class="toggle-btn ref-btn ${measureRef==='outside'?'active':''}" data-r="outside" onclick="setRef('outside')">Outside</button>
        </div>
        <div class="field">
          <label>${dimALabel}</label>
          <div class="input-wrap">
            <input type="number" id="dimA" min="0" step="0.0625" placeholder="e.g. 24" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
        <div class="field">
          <label>${dimBLabel}</label>
          <div class="input-wrap">
            <input type="number" id="dimB" min="0" step="0.0625" placeholder="e.g. 18" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
      </div>

      <div class="card">
        <p class="card-title">&#9642; Trim Profile &amp; Ends</p>
        <div class="field">
          <label>Trim Face Width</label>
          <div class="input-wrap">
            <input type="number" id="${trimIdW}" min="0" step="0.0625" placeholder="e.g. 2.5" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
        <div class="field">
          <label>Trim Thickness</label>
          <div class="input-wrap">
            <input type="number" id="${trimIdT}" min="0" step="0.0625" placeholder="e.g. 0.75" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>

        <div class="section-divider"></div>
        <p class="card-title" style="margin-bottom:12px">&#9642; End Types</p>

        <p class="sub-label">LONG PIECES (both long pieces share same ends)</p>
        <div class="end-row" style="margin-bottom:12px">
          ${endToggle('long1','a',isFrame ? 'Left end' : 'Top end')}
          ${endToggle('long1','b',isFrame ? 'Right end' : 'Bottom end')}
        </div>

        <p class="sub-label">SHORT PIECES (both short pieces share same ends)</p>
        <div class="end-row">
          ${endToggle('short1','a',isFrame ? 'Top end' : 'Left end')}
          ${endToggle('short1','b',isFrame ? 'Bottom end' : 'Right end')}
        </div>
      </div>

      <div class="card results-card">
        <p class="card-title">&#9642; Cut List</p>
        <div id="results"><p class="no-data">Enter dimensions above to calculate</p></div>
      </div>`;

  } else if (mode === 'door') {
    layout.innerHTML = `
      <div class="card">
        <p class="card-title">&#9642; Door Opening</p>
        <div class="toggle-row">
          <button class="toggle-btn unit-btn ${unit==='in'?'active':''}" data-u="in" onclick="setUnit('in')">Inches</button>
          <button class="toggle-btn unit-btn ${unit==='mm'?'active':''}" data-u="mm" onclick="setUnit('mm')">MM</button>
        </div>
        <div class="field">
          <label>Opening Width</label>
          <div class="input-wrap">
            <input type="number" id="doorWidth" min="0" step="0.0625" placeholder="e.g. 32" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
        <div class="field">
          <label>Opening Height</label>
          <div class="input-wrap">
            <input type="number" id="doorHeight" min="0" step="0.0625" placeholder="e.g. 80" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
        <div class="field">
          <label>Reveal (jamb setback)</label>
          <div class="input-wrap">
            <input type="number" id="reveal" min="0" step="0.0625" placeholder="e.g. 0.25" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
      </div>

      <div class="card">
        <p class="card-title">&#9642; Casing &amp; Options</p>
        <div class="field">
          <label>Casing Face Width</label>
          <div class="input-wrap">
            <input type="number" id="doorCasingW" min="0" step="0.0625" placeholder="e.g. 2.5" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>
        <div class="field">
          <label>Casing Thickness</label>
          <div class="input-wrap">
            <input type="number" id="doorCasingT" min="0" step="0.0625" placeholder="e.g. 0.75" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>

        <div class="section-divider"></div>
        <p class="card-title" style="margin-bottom:10px">&#9642; Base Treatment</p>
        <div class="toggle-row">
          <button class="toggle-btn base-btn ${doorBase==='floor'?'active':''}" data-b="floor" onclick="setBase('floor')">Floor</button>
          <button class="toggle-btn base-btn ${doorBase==='plinth'?'active':''}" data-b="plinth" onclick="setBase('plinth')">Plinth Block</button>
        </div>
        <div id="plinthField" class="field" style="display:${doorBase==='plinth'?'block':'none'}">
          <label>Plinth Block Height</label>
          <div class="input-wrap">
            <input type="number" id="plinthH" min="0" step="0.0625" placeholder="e.g. 4.5" oninput="calc()">
            <span class="unit unit-label">${unit}</span>
          </div>
        </div>

        <div class="section-divider"></div>
        <p class="card-title" style="margin-bottom:10px">&#9642; Side Piece Ends</p>
        <div class="end-row">
          ${endToggle('sideL','a','Top end')}
          ${endToggle('sideL','b','Bottom end')}
        </div>
        <p class="sub-label" style="margin-top:8px">Header is always mitered both ends</p>
      </div>

      <div class="card results-card">
        <p class="card-title">&#9642; Cut List</p>
        <div id="results"><p class="no-data">Enter dimensions above to calculate</p></div>
      </div>`;
  }
}

// ── L-Trim Diagram ────────────────────────────────────────────────────────────

function drawLDiagram() {
  const svg = document.getElementById('trimDiagram');
  if (!svg) return;
  const lA = val('legA') || 1.25;
  const lB = val('legB') || 1.25;
  const t  = val('trimThick') || 0.25;
  const scale = 48;
  const ox = 28, oy = 18;
  const aH = Math.min(lA*scale, 96);
  const bW = Math.min(lB*scale, 80);
  const tS = Math.min(t*scale, 18);
  const path = `M${ox} ${oy} L${ox+bW} ${oy} L${ox+bW} ${oy+tS} L${ox+tS} ${oy+tS} L${ox+tS} ${oy+aH} L${ox} ${oy+aH} Z`;
  svg.innerHTML = `
    <defs>
      <pattern id="wood" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(15)">
        <line x1="0" y1="0" x2="0" y2="6" stroke="#5a4530" stroke-width="1.5" opacity="0.4"/>
      </pattern>
    </defs>
    <path d="${path}" fill="url(#wood)" stroke="#c8922a" stroke-width="1.5"/>
    <line x1="${ox}" y1="${oy-7}" x2="${ox+bW}" y2="${oy-7}" stroke="#9a8870" stroke-width="0.8"/>
    <line x1="${ox}" y1="${oy-11}" x2="${ox}" y2="${oy-3}" stroke="#9a8870" stroke-width="0.8"/>
    <line x1="${ox+bW}" y1="${oy-11}" x2="${ox+bW}" y2="${oy-3}" stroke="#9a8870" stroke-width="0.8"/>
    <text x="${ox+bW/2}" y="${oy-13}" text-anchor="middle" font-size="9" fill="#c8922a">Leg B</text>
    <line x1="${ox+bW+7}" y1="${oy}" x2="${ox+bW+7}" y2="${oy+aH}" stroke="#9a8870" stroke-width="0.8"/>
    <line x1="${ox+bW+3}" y1="${oy}" x2="${ox+bW+11}" y2="${oy}" stroke="#9a8870" stroke-width="0.8"/>
    <line x1="${ox+bW+3}" y1="${oy+aH}" x2="${ox+bW+11}" y2="${oy+aH}" stroke="#9a8870" stroke-width="0.8"/>
    <text x="${ox+bW+19}" y="${oy+aH/2+4}" font-size="9" fill="#c8922a">Leg A</text>
    <text x="${ox+4}" y="${oy+tS/2+4}" font-size="8" fill="#9a8870">t</text>`;
}

// ── CALC ──────────────────────────────────────────────────────────────────────

function calc() {
  if (mode === 'ltrim')  calcLtrim();
  if (mode === 'frame')  calcFlatMode('frame');
  if (mode === 'window') calcFlatMode('window');
  if (mode === 'door')   calcDoor();
  if (mode === 'ltrim')  drawLDiagram();
}

function calcLtrim() {
  const L  = val('panelLength');
  const W  = val('panelWidth');
  const tT = val('trimThick');
  const div = document.getElementById('results');

  if (!L || !W || !tT) {
    div.innerHTML = '<p class="no-data">Enter all dimensions above to calculate</p>'; return;
  }

  // Long point = panel dim + 2 × trim thickness (one tT miter tip per end)
  const lpLen = L + 2*tT;
  const lpWid = W + 2*tT;
  const total = 2*lpLen + 2*lpWid;

  div.innerHTML = `
    <div class="results-grid">
      <div class="result-item">
        <span class="cut-badge">Qty: 2</span>
        <p class="result-label">Long Pieces (panel length)</p>
        <p class="result-piece">Long point &rarr;</p>
        <p class="result-value">${fmt(lpLen)}</p>
        <p class="result-note">45&deg; miter both ends</p>
      </div>
      <div class="result-item">
        <span class="cut-badge">Qty: 2</span>
        <p class="result-label">Short Pieces (panel width)</p>
        <p class="result-piece">Long point &rarr;</p>
        <p class="result-value">${fmt(lpWid)}</p>
        <p class="result-note">45&deg; miter both ends</p>
      </div>
      <div class="result-item total-item">
        <p class="result-label">Total Linear Material</p>
        <p class="result-value">${fmt(total)}</p>
        <p class="result-note">Add 10&ndash;15% for waste</p>
      </div>
    </div>
    ${calcBox([
      { label: 'LONG PIECES (&times; 2)', lines: [
          { k: 'Panel length', v: fmt(L) },
          { k: '+ 2 &times; trim thickness', v: '2 &times; ' + fmt(tT) + ' = ' + fmt(2*tT) },
        ], result: 'Long point = ' + fmt(lpLen) },
      { label: 'SHORT PIECES (&times; 2)', lines: [
          { k: 'Panel width', v: fmt(W) },
          { k: '+ 2 &times; trim thickness', v: '2 &times; ' + fmt(tT) + ' = ' + fmt(2*tT) },
        ], result: 'Long point = ' + fmt(lpWid) },
    ])}
    <div class="info-box">
      Set saw to <strong>45&deg;</strong>. Cut first miter, measure from the <strong>long point</strong>, cut opposite end. Short point takes care of itself.
    </div>`;
}

function calcFlatMode(modeKey) {
  const isFrame = modeKey === 'frame';
  const dA  = val('dimA');
  const dB  = val('dimB');
  const tW  = isFrame ? val('trimWidth')   : val('casingWidth');
  const tT  = isFrame ? val('trimThick2')  : val('casingThick');
  const div = document.getElementById('results');

  if (!dA || !dB || !tW || !tT) {
    div.innerHTML = '<p class="no-data">Enter all dimensions above to calculate</p>'; return;
  }

  // Convert outside ref to inside
  let insideA = dA, insideB = dB;
  if (measureRef === 'outside') { insideA = dA - 2*tW; insideB = dB - 2*tW; }

  const lpA = longPt(insideA, tW, ends.long1.a,  ends.long1.b);
  const lpB = longPt(insideB, tW, ends.short1.a, ends.short1.b);
  const total = 2*lpA + 2*lpB;

  const labA = isFrame ? 'Long Pieces'  : 'Side Pieces (height)';
  const labB = isFrame ? 'Short Pieces' : 'Top &amp; Bottom (width)';

  div.innerHTML = `
    <div class="results-grid">
      <div class="result-item">
        <span class="cut-badge">Qty: 2</span>
        <p class="result-label">${labA}</p>
        <p class="result-piece">Long point &rarr;</p>
        <p class="result-value">${fmt(lpA)}</p>
        <p class="result-note">${endLabel(ends.long1.a)} / ${endLabel(ends.long1.b)}</p>
      </div>
      <div class="result-item">
        <span class="cut-badge">Qty: 2</span>
        <p class="result-label">${labB}</p>
        <p class="result-piece">Long point &rarr;</p>
        <p class="result-value">${fmt(lpB)}</p>
        <p class="result-note">${endLabel(ends.short1.a)} / ${endLabel(ends.short1.b)}</p>
      </div>
      <div class="result-item total-item">
        <p class="result-label">Total Linear Material</p>
        <p class="result-value">${fmt(total)}</p>
        <p class="result-note">Add 10&ndash;15% for waste</p>
      </div>
    </div>
    ${calcBox([
      { label: labA.toUpperCase() + ' (&times; 2)', lines: [
          { k: measureRef==='inside' ? 'Inside dimension' : 'Outside dimension', v: fmt(dA) },
          ...(measureRef==='outside' ? [{ k: '&minus; 2 &times; trim width', v: fmt(dA) + ' &minus; ' + fmt(2*tW) + ' = ' + fmt(insideA) }] : []),
          { k: '+ ' + (ends.long1.a==='miter' ? 'trim width (miter end A)' : '0 (straight end A)'), v: ends.long1.a==='miter' ? fmt(tW) : '0' },
          { k: '+ ' + (ends.long1.b==='miter' ? 'trim width (miter end B)' : '0 (straight end B)'), v: ends.long1.b==='miter' ? fmt(tW) : '0' },
        ], result: 'Long point = ' + fmt(lpA) },
      { label: labB.toUpperCase().replace('&AMP;','&') + ' (&times; 2)', lines: [
          { k: measureRef==='inside' ? 'Inside dimension' : 'Outside dimension', v: fmt(dB) },
          ...(measureRef==='outside' ? [{ k: '&minus; 2 &times; trim width', v: fmt(dB) + ' &minus; ' + fmt(2*tW) + ' = ' + fmt(insideB) }] : []),
          { k: '+ ' + (ends.short1.a==='miter' ? 'trim width (miter end A)' : '0 (straight end A)'), v: ends.short1.a==='miter' ? fmt(tW) : '0' },
          { k: '+ ' + (ends.short1.b==='miter' ? 'trim width (miter end B)' : '0 (straight end B)'), v: ends.short1.b==='miter' ? fmt(tW) : '0' },
        ], result: 'Long point = ' + fmt(lpB) },
    ])}
    <div class="info-box">
      Set saw to <strong>45&deg;</strong> for miter ends, <strong>90&deg;</strong> for straight ends. Measure from the <strong>long point</strong> on any mitered end.
    </div>`;
}

function calcDoor() {
  const dW  = val('doorWidth');
  const dH  = val('doorHeight');
  const rev = val('reveal');
  const cW  = val('doorCasingW');
  const cT  = val('doorCasingT');
  const pH  = doorBase === 'plinth' ? val('plinthH') : 0;
  const div = document.getElementById('results');

  const pf = document.getElementById('plinthField');
  if (pf) pf.style.display = doorBase === 'plinth' ? 'block' : 'none';

  if (!dW || !dH || !cW || !cT) {
    div.innerHTML = '<p class="no-data">Enter all dimensions above to calculate</p>'; return;
  }

  // Inside width/height from the jamb edge (reveal sets casing position)
  const insideW = dW + 2*rev;
  const insideH = dH + rev - pH;

  const sE = ends.sideL;
  const lpSide   = longPt(insideH, cW, sE.a, sE.b);
  const lpHeader = longPt(insideW, cW, 'miter', 'miter');
  const total = 2*lpSide + lpHeader;

  div.innerHTML = `
    <div class="results-grid">
      <div class="result-item">
        <span class="cut-badge">Qty: 2</span>
        <p class="result-label">Side Pieces</p>
        <p class="result-piece">Long point &rarr;</p>
        <p class="result-value">${fmt(lpSide)}</p>
        <p class="result-note">Top: ${endLabel(sE.a)} &middot; Bottom: ${endLabel(sE.b)}</p>
      </div>
      <div class="result-item">
        <span class="cut-badge">Qty: 1</span>
        <p class="result-label">Header Piece</p>
        <p class="result-piece">Long point &rarr;</p>
        <p class="result-value">${fmt(lpHeader)}</p>
        <p class="result-note">45&deg; miter both ends</p>
      </div>
      <div class="result-item total-item">
        <p class="result-label">Total Linear Material</p>
        <p class="result-value">${fmt(total)}</p>
        <p class="result-note">Add 10&ndash;15% for waste</p>
      </div>
    </div>
    ${calcBox([
      { label: 'SIDE PIECES (&times; 2)', lines: [
          { k: 'Opening height', v: fmt(dH) },
          { k: '+ reveal (top)', v: fmt(rev) },
          ...(pH > 0 ? [{ k: '&minus; plinth block height', v: fmt(pH) }] : []),
          { k: '+ ' + (sE.a==='miter' ? 'casing width (miter top)' : '0 (straight top)'), v: sE.a==='miter' ? fmt(cW) : '0' },
          { k: '+ ' + (sE.b==='miter' ? 'casing width (miter bottom)' : '0 (straight bottom)'), v: sE.b==='miter' ? fmt(cW) : '0' },
        ], result: 'Long point = ' + fmt(lpSide) },
      { label: 'HEADER PIECE (&times; 1)', lines: [
          { k: 'Opening width', v: fmt(dW) },
          { k: '+ 2 &times; reveal', v: '2 &times; ' + fmt(rev) + ' = ' + fmt(2*rev) },
          { k: '+ 2 &times; casing width (miter)', v: '2 &times; ' + fmt(cW) + ' = ' + fmt(2*cW) },
        ], result: 'Long point = ' + fmt(lpHeader) },
    ])}
    <div class="info-box">
      Set saw to <strong>45&deg;</strong> for miter ends, <strong>90&deg;</strong> for straight ends.
      ${doorBase==='plinth' && pH > 0 ? 'Side pieces rest on top of ' + fmt(pH) + ' plinth blocks.' : 'Side pieces sit directly on the floor.'}
    </div>`;
}

// Init
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW error:', e));
  });
}
</script>
</body>
</html>
